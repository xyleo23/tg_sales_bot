services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tg_bot:changeme@postgres:5432/tg_sales
    volumes:
      - bot_data:/app/data
      - bot_sessions:/app/data/sessions
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tg_bot
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: tg_sales
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_bot -d tg_sales"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: {}
  bot_data: {}
  bot_sessions: {}
